services:
  postgres:
    image: postgres:17
    container_name: transaction-indexer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: transaction_indexer
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U indexer -d transaction_indexer']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: transaction-indexer-postgres-data
